deployment:
  replicas: 2

service:
  type: LoadBalancer
  annotations: {}

ingressClass:
  enabled: true
  isDefaultClass: true

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true

logs:
  general:
    level: INFO

ports:
  web:
    port: 80
    expose:
      default: true
  websecure:
    port: 443
    expose:
      default: true
  traefik:
    port: 9000
    expose:
      default: false   # dashboard not exposed publicly

# Rancher uses websockets - make sure timeouts are sane
additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"  # needed for Rancher backend

