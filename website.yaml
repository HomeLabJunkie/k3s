apiVersion: apps/v1
kind: Deployment
metadata:
  name: website
  namespace: website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: website
  template:
    metadata:
      labels:
        app: website
    spec:
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command:
        - git
        - clone
        - https://github.com/HomeLabJunkie/nginx-website
        - /usr/share/nginx/html
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: website
  namespace: website
spec:
  selector:
    app: website
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: website
  namespace: website
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: jeffriffle.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: website
            port:
              number: 80
  tls:
  - hosts:
    - jeffriffle.com
    secretName: tls-website
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tls-website
  namespace: website
spec:
  secretName: tls-website
  dnsNames:
  - jeffriffle.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
